name: Update mortgage rates

# Pulls the daily rates + assumptions from the Seven Gables morning report and
# patches index.html. Render auto-deploys on the resulting push.
#
# Target: 10:31am Pacific, right after the report's 10:30am post. GitHub cron is
# UTC and does NOT shift for daylight saving, so we list both equivalents:
#   18:31 UTC = 10:31 PST (winter)   |   17:31 UTC = 10:31 PDT (summer)
# Whichever one isn't "10:31 local" that day runs an hour early; the script's
# date guard makes that early run skip cleanly until the report shows today's
# date, so effectively it updates at 10:31 Pacific year-round.

on:
  schedule:
    - cron: "31 17 * * *"   # 10:31 PDT (summer) / 09:31 PST
    - cron: "31 18 * * *"   # 10:31 PST (winter) / 11:31 PDT
  workflow_dispatch: {}   # allows a manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-rates
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch + patch rates (fail-safe; no write on any error)
        run: python3 scripts/update_rates.py

      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name  "villa-warner-rates-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: auto-update mortgage rates from morning report ($(date -u +%F))"
            git push
            echo "Rates updated and pushed."
          else
            echo "No rate changes today — nothing to commit."
          fi
